server {
    listen 80;
    server_name localhost;

    # ── Frontend (SPA) ────────────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;   # SPA fallback
    }

    # ── Math Engine API (/api/v1/ — more specific, must come before /api/) ────
    location /api/v1/ {
        proxy_pass         http://math-engine:8081/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Java Backend API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Math Engine (legacy path, dev only) ───────────────────────────────────
    location /math-api/ {
        rewrite            ^/math-api/(.*)$ /$1 break;
        proxy_pass         http://math-engine:8081;
        proxy_set_header   Host $host;
    }

    # ── WebSocket (будущая коллаборация) ─────────────────────────────────────
    # location /ws/ {
    #     proxy_pass         http://backend:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade    $http_upgrade;
    #     proxy_set_header   Connection "upgrade";
    # }

    # ── Swagger UI (только dev) ───────────────────────────────────────────────
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
    }

    # ── RabbitMQ Management UI ────────────────────────────────────────────────
    location /rabbitmq/ {
        rewrite          ^/rabbitmq/(.*)$ /$1 break;
        proxy_pass       http://rabbitmq:15672;
        proxy_set_header Host $host;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
}
