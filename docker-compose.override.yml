# Dev overrides: hot reload, volume mounts, relaxed settings
# Этот файл подхватывается автоматически при `docker-compose up`

services:

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_API_V1_PROXY_TARGET: http://math-engine:8081
      VITE_API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - math-engine

  math-engine:
    volumes:
      - ./math-engine:/app/math-engine
      - ./dmc_ai:/app/dmc_ai
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    ports:
      - "8081:8081"

  backend:
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    ports:
      - "8080:8080"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  rabbitmq:
    ports:
      - "5673:5672"
      - "15673:15672"

  nginx:
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
